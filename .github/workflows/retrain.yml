name: Retrain

on:
  schedule:
    - cron: "0 3 * * 0"  # Every Sunday at 03:00 UTC
  workflow_dispatch:
    inputs:
      pages:
        description: "Otodom pages to scrape (1 page ≈ 36 listings)"
        default: "15"
        required: false

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect Otodom data
        id: collect
        run: |
          python -m src.data_collection.collect_data \
            --pages ${{ github.event.inputs.pages || '15' }} \
            --output data/raw/otodom_collected.parquet
          echo "collected=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Fail if no data collected
        if: steps.collect.outcome == 'failure'
        run: |
          echo "::error::Data collection failed — Otodom page structure may have changed."
          exit 1

      - name: Train model
        run: python train.py --data data/raw/otodom_collected.parquet

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model-${{ github.run_id }}
          path: |
            models/xgboost_model.joblib
            models/feature_names.json
          retention-days: 90

      - name: Commit retrained model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f models/xgboost_model.joblib models/feature_names.json
          git diff --staged --quiet && echo "No model changes to commit." && exit 0
          git commit -m "retrain: weekly model update $(date -u +%Y-%m-%d)"
          git push
